name: Twitter Intelligence
on:
  schedule:
    - cron: '*/10 * * * *' # Alle 10 Minuten
  workflow_dispatch:      # Zum manuellen Testen

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests discord-py
      - name: Execute
        env:
          # Wir mappen deine echten Secret-Namen auf die Variablennamen im Python-Code
          WEBHOOK_LIVE_CHARTS: ${{ secrets.LIVE_CHARTS }}
          WEBHOOK_TWITTER_TRADER: ${{ secrets.TWITTER_TRADER }}
          WEBHOOK_MARKET_ALERTS: ${{ secrets.MARKET_ALERTS }}
        run: python multinews.py
